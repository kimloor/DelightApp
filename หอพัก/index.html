<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2A231D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="สมุดหอพัก">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>สมุดหอพัก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Baloo+2:wght@700;800&family=Kanit:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F1E8;
    --surface:#FFFEFB;
    --ink:#2A231D;
    --ink-soft:#7A6F63;
    --line:#E2D6C4;
    --teal:#2E6B5E;
    --teal-soft:#E4EFEA;
    --rust:#B4552F;
    --rust-soft:#F5E6DE;
    --gold:#C08A2E;
    --gold-soft:#F3E7CE;
    --shadow: 0 1px 2px rgba(42,35,29,0.06), 0 6px 20px rgba(42,35,29,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans Thai', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  ::selection{background:var(--gold-soft);}

  .app{
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }
  .app-body{
    display:flex;
    flex:1;
    min-height:0;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:230px;
    flex-shrink:0;
    background:var(--surface);
    border-right:1px solid var(--line);
    padding:28px 18px;
    display:flex;
    flex-direction:column;
    gap:28px;
  }
  .brand{
    display:flex;
    flex-direction:column;
    gap:2px;
    padding:0 6px;
  }
  .brand .mark{
    width:38px;height:38px;
    border-radius:9px;
    display:block;
    margin-bottom:10px;
  }
  .brand h1{
    font-family:'Fraunces',serif;
    font-size:19px;
    font-weight:600;
    margin:0;
    letter-spacing:-0.01em;
  }
  .brand p{
    margin:2px 0 0;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  nav{display:flex;flex-direction:column;gap:3px;}
  .nav-btn{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;
    border-radius:8px;
    border:none;
    background:transparent;
    color:var(--ink-soft);
    font-family:inherit;
    font-size:14.5px;
    font-weight:500;
    text-align:left;
    cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  .nav-btn:hover{background:var(--bg);color:var(--ink);}
  .nav-btn.active{background:var(--ink);color:var(--bg);}
  .nav-btn .icon{font-size:16px;width:18px;text-align:center;}

  /* ---------- Topbar (ตั้งค่า + สถานะซิงก์ อยู่บนสุดเสมอ) ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:12px 18px;
    background:var(--ink);
    color:var(--bg);
    flex-shrink:0;
    position:sticky;top:0;z-index:20;
  }
  .topbar-brand{
    display:flex;align-items:center;gap:9px;
    font-family:'Fraunces',serif;font-weight:600;font-size:15.5px;
  }
  .topbar-brand .mark{
    width:26px;height:26px;border-radius:7px;
    flex-shrink:0;display:block;
  }
  .topbar-brand .wordmark{
    height:30px;width:auto;display:block;
  }
  .topbar-right{display:flex;align-items:center;gap:10px;}
  #syncStatusLine{font-size:11.5px;color:var(--bg);opacity:0.75;white-space:nowrap;}
  .topbar .settings-btn{
    display:flex;align-items:center;gap:6px;
    background:rgba(246,241,232,0.12);
    color:var(--bg);
    border:1px solid rgba(246,241,232,0.28);
    border-radius:8px;
    padding:7px 12px;
    font-family:inherit;font-size:13px;font-weight:500;
    cursor:pointer;
    flex-shrink:0;
  }
  .topbar .settings-btn:hover{background:rgba(246,241,232,0.22);}
  @media (max-width:520px){
    #syncStatusLine{display:none;}
    .topbar-brand .wordmark{height:24px;}
  }

  /* ---------- Main ---------- */
  main{
    flex:1;
    padding:32px 40px 60px;
    max-width:1100px;
  }
  .page-head{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom:26px;
    flex-wrap:wrap;
    gap:14px;
  }
  .page-head h2{
    font-family:'Fraunces',serif;
    font-size:28px;
    font-weight:600;
    margin:0 0 4px;
    letter-spacing:-0.01em;
  }
  .page-head .sub{color:var(--ink-soft);font-size:14px;margin:0;}

  .btn{
    display:inline-flex;align-items:center;gap:7px;
    padding:10px 16px;
    border-radius:8px;
    border:1px solid var(--ink);
    background:var(--ink);
    color:var(--bg);
    font-family:inherit;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    transition:opacity .15s ease, transform .1s ease;
  }
  .btn:hover{opacity:.85;}
  .btn:active{transform:scale(0.98);}
  .btn.ghost{
    background:transparent;
    color:var(--ink);
    border:1px solid var(--line);
  }
  .btn.ghost:hover{background:var(--surface);}
  .btn.danger{background:var(--rust);border-color:var(--rust);}
  .btn.small{padding:6px 11px;font-size:12.5px;border-radius:6px;}

  /* ---------- Stat cards ---------- */
  .stat-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    margin-bottom:30px;
  }
  .stat-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:12px;
    padding:18px 18px 16px;
    box-shadow:var(--shadow);
  }
  .stat-card .label{
    font-size:12.5px;color:var(--ink-soft);
    margin:0 0 8px;font-weight:500;
  }
  .stat-card .value{
    font-family:'Fraunces',serif;
    font-size:30px;
    font-weight:600;
    margin:0;
    letter-spacing:-0.01em;
  }
  .stat-card .value.teal{color:var(--teal);}
  .stat-card .value.rust{color:var(--rust);}
  .stat-card .foot{font-size:12px;color:var(--ink-soft);margin-top:4px;}

  /* ---------- Section card ---------- */
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:24px;
  }
  .card-head{
    padding:16px 20px;
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
  }
  .card-head h3{
    font-family:'Fraunces',serif;
    font-size:17px;font-weight:600;margin:0;
  }

  /* ---------- Room key-tag grid ---------- */
  .room-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px,1fr));
    gap:14px;
    padding:20px;
  }
  .room-tag{
    position:relative;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 14px 14px;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .room-tag:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
  .room-tag::before{
    content:'';
    position:absolute;
    top:14px;right:14px;
    width:9px;height:9px;
    border-radius:50%;
    background:var(--line);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.06);
  }
  .room-tag .num{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    margin:2px 0 6px;
  }
  .room-tag .floor{font-size:12px;color:var(--ink-soft);margin-bottom:10px;}
  .status-pill{
    display:inline-flex;align-items:center;gap:5px;
    font-size:11.5px;font-weight:600;
    padding:3px 9px;border-radius:20px;
  }
  .status-pill.occupied{background:var(--teal-soft);color:var(--teal);}
  .status-pill.vacant{background:var(--rust-soft);color:var(--rust);}
  .room-tag .rent{
    margin-top:10px;font-size:12.5px;color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
  }

  /* ---------- Table ---------- */
  table{width:100%;border-collapse:collapse;}
  thead th{
    text-align:left;
    font-size:12px;
    font-weight:600;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.03em;
    padding:10px 20px;
    border-bottom:1px solid var(--line);
    background:var(--bg);
  }
  tbody td{
    padding:13px 20px;
    border-bottom:1px solid var(--line);
    font-size:14px;
    vertical-align:middle;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FBF8F2;}
  .muted{color:var(--ink-soft);}
  .mono{font-family:'IBM Plex Mono',monospace;font-size:13px;}

  .empty{
    padding:50px 20px;
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
  }
  .empty .big{font-size:30px;margin-bottom:8px;}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;
    background:rgba(42,35,29,0.35);
    display:none;
    align-items:center;justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--surface);
    border-radius:14px;
    width:100%;max-width:420px;
    padding:26px;
    box-shadow:0 20px 60px rgba(0,0,0,0.2);
    max-height:88vh;
    overflow-y:auto;
  }
  .modal.wide{max-width:680px;}
  .modal h3{
    font-family:'Fraunces',serif;
    font-size:19px;font-weight:600;
    margin:0 0 18px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;font-size:12.5px;font-weight:500;
    color:var(--ink-soft);margin-bottom:6px;
  }
  .field input, .field select, .field textarea{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-family:inherit;
    font-size:14px;
    background:var(--bg);
    color:var(--ink);
  }
  .field textarea{resize:vertical;line-height:1.5;}
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:2px solid var(--gold);
    outline-offset:0;
  }
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .modal-actions{
    display:flex;justify-content:flex-end;gap:8px;
    margin-top:20px;
  }

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--bg);
    padding:11px 20px;border-radius:9px;
    font-size:13.5px;font-weight:500;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    opacity:0;pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:100;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  select.bill-status{
    border:none;background:transparent;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;
  }
  .badge-paid{color:var(--teal);}
  .badge-unpaid{color:var(--rust);}

  .loading-note{padding:40px;text-align:center;color:var(--ink-soft);font-size:14px;}

  /* ---------- Floor groups ---------- */
  .floor-group{border-bottom:1px solid var(--line);}
  .floor-group:last-child{border-bottom:none;}
  .floor-group-head{
    padding:12px 20px;
    background:var(--bg);
    font-size:12.5px;font-weight:600;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:0.03em;
  }

  .toolbar-input{
    padding:8px 12px;border:1px solid var(--line);border-radius:8px;
    font-family:inherit;font-size:13.5px;background:var(--bg);color:var(--ink);
  }
  .toolbar-select{
    padding:7px 10px;border:1px solid var(--line);border-radius:8px;
    font-family:inherit;font-size:13.5px;background:var(--bg);color:var(--ink);
  }

  /* ---------- Print ---------- */
  #printArea{display:none;}
  @media print{
    @page{ size: A5 landscape; margin: 8mm; }
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{display:block;position:absolute;top:0;left:0;width:100%;padding:0;}
    .invoice-page{page-break-after:always;}
    .invoice-page:last-child{page-break-after:auto;}
    .invoice{font-family:'IBM Plex Sans Thai', sans-serif;color:#1a1a1a;font-size:10.5px;}
    .invoice h1{font-family:'Fraunces',serif;font-size:16px;margin:0 0 3px;}
    .invoice p{margin:1px 0;font-size:10.5px;}
    .invoice table{width:100%;border-collapse:collapse;margin-top:7px;}
    .invoice td, .invoice th{border:1px solid #999;padding:4px;text-align:left;font-size:10px;}

    .inv-topbar{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1a1a1a;padding-bottom:5px;margin-bottom:6px;}
    .inv-topbar .inv-brand{display:flex;align-items:center;gap:6px;}
    .inv-logo{width:26px;height:26px;flex:none;}
    .inv-shop-name{font-family:'Fraunces',serif;font-size:12.5px;font-weight:600;margin:0;}
    .inv-shop-address{font-size:9px;color:#444;margin:1px 0 0;max-width:260px;}
    .inv-doctitle{font-size:9.5px;font-weight:700;letter-spacing:0.06em;color:#555;margin-bottom:2px;}
    .inv-docno{font-family:'Fraunces',serif;font-size:15px;font-weight:600;text-align:right;}

    .inv-body{width:100%;}
    .inv-meta{width:100%;border-collapse:collapse;margin-bottom:0;margin-top:0;table-layout:fixed;}
    .inv-meta td{border:1px solid #999;padding:3px 5px;font-size:9.5px;vertical-align:middle;}
    .inv-meta td.k{color:#555;font-size:8.5px;text-align:center;line-height:1.3;background:#f7f5f0;}
    .inv-meta td.v{font-weight:600;}
    .inv-items{width:100%;border-collapse:collapse;margin-top:6px;table-layout:fixed;}
    .inv-items th{background:#efefef;border:1px solid #999;padding:3px;font-size:9px;text-align:center;}
    .inv-items td{border:1px solid #999;padding:3px 5px;font-size:9.5px;}
    .inv-items td.c{text-align:center;}
    .inv-items td.r{text-align:right;font-family:'IBM Plex Mono',monospace;}
    .inv-items tfoot td{border:1px solid #999;padding:5px 6px;font-size:9.5px;background:#f7f5f0;}
    .inv-items tfoot td.words{font-weight:600;}
    .inv-items tfoot td.label{text-align:right;color:#555;white-space:nowrap;}
    .inv-items tfoot td.amount{text-align:right;font-weight:700;font-family:'IBM Plex Mono',monospace;font-size:11px;}

    .inv-bottom{display:flex;justify-content:space-between;align-items:flex-start;margin-top:8px;gap:10px;}
    .inv-notes{font-size:9px;color:#333;line-height:1.4;white-space:pre-line;}
    .inv-notes .label{font-weight:600;}
    .inv-qr{flex:none;text-align:center;}
    .inv-qr img{width:104px;height:104px;object-fit:contain;border:1px solid #999;padding:3px;background:#fff;}
    .inv-qr .qr-label{font-size:9px;color:#333;margin-top:3px;}
    .inv-sign{margin-top:12px;text-align:right;font-size:9.5px;padding-right:8px;}
    .inv-sign .line{margin-bottom:4px;}
  }

  @media (max-width: 760px){
    .app-body{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;align-items:center;padding:16px 18px;overflow-x:auto;}
    .brand{display:none;}
    nav{flex-direction:row;}
    main{padding:24px 18px 50px;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .field-row{grid-template-columns:1fr;}
  }
</style>
</head>

/* ============ State ============ */

let bills = [];
let properties = [];

let dataReady = false;

const THB = n => Number(n||0).toLocaleString('th-TH', {maximumFractionDigits:0});

/* แปลงจำนวนเงิน (บาท, จำนวนเต็ม) เป็นคำอ่านภาษาไทยแบบใบเสร็จ เช่น 5993 -> "ห้าพันเก้าร้อยเก้าสิบสามบาทถ้วน" */
function bahtText(amount){
  const digitTh = ['ศูนย์','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
  const unitTh = ['','สิบ','ร้อย','พัน','หมื่น','แสน','ล้าน'];
  function convertGroup(numStr){
    let out = '';
    const len = numStr.length;
    for(let i=0;i<len;i++){
      const digit = Number(numStr[i]);
      const place = len - i - 1; // 0=หน่วย,1=สิบ,...
      if(digit===0) continue;
      if(place===0){
        if(digit===1 && len>1) out += 'เอ็ด';
        else out += digitTh[digit];
      } else if(place===1){
        if(digit===1) out += 'สิบ';
        else if(digit===2) out += 'ยี่สิบ';
        else out += digitTh[digit]+'สิบ';
      } else {
        out += digitTh[digit] + unitTh[place];
      }
    }
    return out;
  }
  let n = Math.round(Number(amount)||0);
  if(n===0) return 'ศูนย์บาทถ้วน';
  const neg = n < 0; n = Math.abs(n);
  let millionsPart = '';
  let intStr = String(n);
  // แบ่งเป็นกลุ่มล้าน (ตัวแปลงรองรับได้ถึงหลักล้านต่อกลุ่ม)
  let groups = [];
  while(intStr.length > 6){
    groups.unshift(intStr.slice(-6));
    intStr = intStr.slice(0, -6);
  }
  groups.unshift(intStr);
  let words = groups.map(g=>convertGroup(g)).join('ล้าน');
  return (neg?'ลบ':'') + words + 'บาทถ้วน';
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const monthLabel = (ym) => {
  if(!ym || !/^\d{4}-\d{2}$/.test(ym)) return 'ไม่ระบุเดือน';
  const [y,m] = ym.split('-');
  const names=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return names[parseInt(m,10)-1] + ' ' + (parseInt(y,10)+543);
};
const thisMonth = () => {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
};

/* แปลงวันที่แบบ ISO ("2569-07-13") จาก <input type="date"> ให้เป็นรูปแบบไทยอ่านง่าย เช่น "13 ก.ค. 2569" */
const formatThaiDate = (iso) => {
  if(!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return '—';
  const [y,m,d] = iso.split('-');
  const names=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${parseInt(d,10)} ${names[parseInt(m,10)-1]} ${parseInt(y,10)+543}`;
};

/* ============ Storage ============
   Three layers, in priority order:
   1. Google Sheets (via an Apps Script Web App URL the user sets up
      themselves) — lets data sync across PC and phone.
   2. window.storage — used automatically when running inside a
      Claude artifact.
   3. localStorage — always used as an instant local cache, and as
      the fallback when neither of the above is available. */

/* ค่าเริ่มต้น: ลิงก์ Google Sheets ของคุณ ฝังไว้ในไฟล์นี้เลย
   เพื่อให้เชื่อมต่อได้ทันทีทุกครั้งที่เปิด โดยไม่ต้องพึ่ง localStorage
   (ซึ่งบางเบราว์เซอร์ไม่บันทึกให้เมื่อเปิดไฟล์แบบ file://) */
const DEFAULT_SHEET_URL = 'https://script.google.com/macros/s/AKfycbxD9bQkCdI1uVDKxUgrdtMbcJj737oHiHaCbZgY61-ckVIBekgi8vwGnTle6MKwjQDl/exec';

let sheetUrl = DEFAULT_SHEET_URL;
try{
  const saved = localStorage.getItem('dorm:sheetUrl');
  // ถ้าเคยตั้งค่าไว้เอง (เช่นเปลี่ยนไปใช้ชีตอื่น) ให้ใช้ค่านั้นแทน
  if (saved !== null) sheetUrl = saved; // saved === '' หมายถึงผู้ใช้เลือกปิดการซิงก์เอง
}catch(e){}
let syncState = sheetUrl ? 'unknown' : 'local'; // 'local' | 'unknown' | 'ok' | 'error'

function updateSyncLine(){
  const el = document.getElementById('syncStatusLine');
  if(!el) return;
  if(!sheetUrl){
    el.textContent = 'เก็บข้อมูลในเครื่องนี้เท่านั้น';
  } else if(syncState === 'ok'){
    el.textContent = '🟢 ซิงก์กับ Google Sheets แล้ว';
  } else if(syncState === 'error'){
    el.textContent = '🔴 เชื่อมต่อ Sheets ไม่ได้ (ใช้ข้อมูลในเครื่อง)';
  } else {
    el.textContent = '🟡 กำลังเชื่อมต่อ Google Sheets…';
  }
}

async function remoteGetAll(){
  const url = new URL(sheetUrl);
  url.searchParams.set('action','getAll');
  url.searchParams.set('_', Date.now());
  const res = await fetch(url.toString());
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();
  if(data && data.error) throw new Error(data.error);
  return data;
}

async function remoteSaveTable(table, items){
  const res = await fetch(sheetUrl, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({table, items})
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();
  if(data && data.error) throw new Error(data.error);
  return data;
}

async function wsGet(key){
  if(!window.storage) return null;
  try{ const r = await window.storage.get(key,false); return r?r.value:null; }catch(e){ return null; }
}
async function wsSet(key, value){
  if(!window.storage) return;
  try{ await window.storage.set(key, value, false); }catch(e){}
}

function cacheLocally(){
  try{
    localStorage.setItem('dorm:rooms', JSON.stringify(rooms));
    localStorage.setItem('dorm:tenants', JSON.stringify(tenants));
    localStorage.setItem('dorm:bills', JSON.stringify(bills));
    localStorage.setItem('dorm:properties', JSON.stringify(properties));
  }catch(e){}
}
function loadFromLocalCache(){
  try{ rooms = JSON.parse(localStorage.getItem('dorm:rooms')||'[]'); }catch(e){ rooms=[]; }
  try{ tenants = JSON.parse(localStorage.getItem('dorm:tenants')||'[]'); }catch(e){ tenants=[]; }
  try{ bills = JSON.parse(localStorage.getItem('dorm:bills')||'[]'); }catch(e){ bills=[]; }
  try{ properties = JSON.parse(localStorage.getItem('dorm:properties')||'[]'); }catch(e){ properties=[]; }
}

/* ย้ายข้อมูลเก่า (ก่อนมีฟีเจอร์หลายอพาร์ทเมนท์) ให้เข้าอพาร์ทเมนท์เริ่มต้นอัตโนมัติ */
function migratePropertyScoping(){
  let changed = false;
  if(!properties.length){
    properties = [{id:'อพาร์ทเมนท์ 1', name:'อพาร์ทเมนท์ 1'}];
    changed = true;
  }
  const defaultPropId = properties[0].id;
  rooms.forEach(r=>{
    if(!r.propertyId){
      const oldId = r.id;
      r.propertyId = defaultPropId;
      r.id = defaultPropId + '::' + r.number;
      tenants.forEach(t=>{ if(t.roomId===oldId){ t.roomId=r.id; t.id=r.id; } });
      bills.forEach(b=>{ if(b.roomId===oldId){ b.roomId=r.id; b.id=r.id+'::'+b.month; } });
      changed = true;
    }
  });
  if(!currentPropertyId || !properties.find(p=>p.id===currentPropertyId)){
    currentPropertyId = properties[0].id;
    try{ localStorage.setItem('dorm:currentProperty', currentPropertyId); }catch(e){}
  }
  // อัตราค่าน้ำ/ไฟเริ่มต้น (บาท/หน่วย) — เผื่อเป็นข้อมูลเก่าที่ยังไม่มีฟิลด์นี้
  properties.forEach(p=>{
    if(p.waterRate===undefined || p.waterRate===null){ p.waterRate = 18; changed = true; }
    if(p.electricRate===undefined || p.electricRate===null){ p.electricRate = 8; changed = true; }
  });
  return changed;
}

function currentProperty(){ return properties.find(p=>p.id===currentPropertyId); }
function currentRooms(){ return rooms.filter(r=>r.propertyId===currentPropertyId); }
function currentTenants(){
  const ids = new Set(currentRooms().map(r=>r.id));
  return tenants.filter(t=>ids.has(t.roomId));
}
function currentBills(){
  const ids = new Set(currentRooms().map(r=>r.id));
  return bills.filter(b=>ids.has(b.roomId));
}

/* สร้างเลขที่บิล/ใบแจ้งหนี้ขึ้นเองแบบไม่ซ้ำ — เป็นเลขรันต่อเนื่องทั้งระบบ (ทุกอพาร์ทเมนท์ ทุกเดือนรวมกัน)
   รูปแบบ: INV-{ปีเดือน}-{เลขรัน 4 หลัก} เช่น INV-256907-0012
   ตรวจสอบกับเลขที่มีอยู่แล้วทั้งหมดเสมอ ถ้าเลขที่คำนวณได้ดันซ้ำ (กรณีแก้ไขข้อมูลเอง) จะรันเลขถัดไปให้อัตโนมัติ */
function genInvoiceNo(month){
  const ym = (month || thisMonth()).replace('-','');
  const existing = new Set(bills.map(b=>b.invoiceNo).filter(Boolean));
  let seq = 0;
  existing.forEach(no=>{
    const m = /-(\d+)$/.exec(no);
    if(m){ const n = parseInt(m[1],10); if(n>seq) seq = n; }
  });
  seq++;
  let candidate = `INV-${ym}-${String(seq).padStart(4,'0')}`;
  while(existing.has(candidate)){
    seq++;
    candidate = `INV-${ym}-${String(seq).padStart(4,'0')}`;
  }
  return candidate;
}

/* ย้อนกลับไปเติมเลขที่บิลให้บิลเก่าที่ยังไม่มี (ก่อนมีฟีเจอร์นี้) */
function assignMissingInvoiceNos(){
  let changed = false;
  bills.slice().sort((a,b)=> (a.month>b.month?1:-1)).forEach(b=>{
    if(!b.invoiceNo){
      b.invoiceNo = genInvoiceNo(b.month);
      changed = true;
    }
  });
  return changed;
}

async function loadData(){
  if (sheetUrl) {
    try{
      const data = await remoteGetAll();
      rooms = data.rooms || [];
      tenants = data.tenants || [];
      bills = data.bills || [];
      properties = data.properties || [];
      syncState = 'ok';
      cacheLocally();
    }catch(e){
      console.error('sheet load error', e);
      syncState = 'error';
      loadFromLocalCache();
    }
  } else if (window.storage) {
    const [r,t,b,p] = await Promise.all([wsGet('dorm:rooms'), wsGet('dorm:tenants'), wsGet('dorm:bills'), wsGet('dorm:properties')]);
    try{ rooms = r?JSON.parse(r):[]; }catch(e){ rooms=[]; }
    try{ tenants = t?JSON.parse(t):[]; }catch(e){ tenants=[]; }
    try{ bills = b?JSON.parse(b):[]; }catch(e){ bills=[]; }
    try{ properties = p?JSON.parse(p):[]; }catch(e){ properties=[]; }
  } else {
    loadFromLocalCache();
  }

  const migrated = migratePropertyScoping();
  const invoicesAssigned = assignMissingInvoiceNos();
  if(migrated || invoicesAssigned){
    await Promise.all([saveRooms(), saveTenants(), saveBills(), saveProperties()]);
  }

  updateSyncLine();
  dataReady = true;
  renderPropertySelect();
  render();
}

async function saveTable(table, items){
  try{ localStorage.setItem('dorm:'+table, JSON.stringify(items)); }catch(e){}
  if (sheetUrl) {
    try{
      await remoteSaveTable(table, items);
      syncState = 'ok';
    }catch(e){
      console.error('sheet save error', e);
      syncState = 'error';
    }
    updateSyncLine();
    return;
  }
  if (window.storage) { await wsSet('dorm:'+table, JSON.stringify(items)); }
}
async function saveRooms(){ await saveTable('rooms', rooms); }
async function saveTenants(){ await saveTable('tenants', tenants); }
async function saveBills(){ await saveTable('bills', bills); }
async function saveProperties(){ await saveTable('properties', properties); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ============ Nav ============ */
document.getElementById('nav').addEventListener('click', (e)=>{
  const btn = e.target.closest('.nav-btn');

/* ============ Property switcher ============ */
function renderPropertySelect(){
  const sel = document.getElementById('propertySelect');
  if(!sel) return;
  sel.innerHTML = properties.map(p=>`<option value="${p.id}" ${p.id===currentPropertyId?'selected':''}>${p.name}</option>`).join('')
    + `<option value="__add__">+ เพิ่มอพาร์ทเมนท์ใหม่…</option>`;
}
document.getElementById('propertySelect').addEventListener('change', async (e)=>{
  const val = e.target.value;
  if(val === '__add__'){
    const name = prompt('ชื่ออพาร์ทเมนท์ใหม่:');
    renderPropertySelect(); // reset selection back to current if cancelled
    if(!name || !name.trim()) return;
    const trimmed = name.trim();
    if(properties.find(p=>p.id===trimmed)){ showToast('มีอพาร์ทเมนท์ชื่อนี้อยู่แล้ว'); return; }
    properties.push({id:trimmed, name:trimmed, waterRate:18, electricRate:8});
    currentPropertyId = trimmed;
    try{ localStorage.setItem('dorm:currentProperty', currentPropertyId); }catch(err){}
    await saveProperties();
    renderPropertySelect();
    render();
    showToast('เพิ่มอพาร์ทเมนท์แล้ว');
    return;
  }
  currentPropertyId = val;
  try{ localStorage.setItem('dorm:currentProperty', currentPropertyId); }catch(err){}
  render();
});
document.getElementById('editPropertyBtn').addEventListener('click', ()=>{
  if(!currentProperty()) return;
  openModal(ratesFormHtml());
});

/* ============ Modal helpers ============ */

  const modalEl = document.getElementById('modalBody');
  modalEl.innerHTML = html;

  document.getElementById('overlay').classList.add('open');
  attachModalEvents();

function attachModalEvents(){
  const cancelBtn = document.getElementById('cancelBtn');
  if(cancelBtn) cancelBtn.onclick = closeModal;

  const saveRoomBtn = document.getElementById('saveRoomBtn');
  if(saveRoomBtn) saveRoomBtn.onclick = onSaveRoom;
  const deleteRoomBtn = document.getElementById('deleteRoomBtn');
  if(deleteRoomBtn) deleteRoomBtn.onclick = onDeleteRoom;

  const saveTenantBtn = document.getElementById('saveTenantBtn');
  if(saveTenantBtn) saveTenantBtn.onclick = onSaveTenant;
  const deleteTenantBtn = document.getElementById('deleteTenantBtn');
  if(deleteTenantBtn) deleteTenantBtn.onclick = onDeleteTenant;

  const saveMeterBtn = document.getElementById('saveMeterBtn');
  if(saveMeterBtn) saveMeterBtn.onclick = onSaveMeter;
  const saveBulkMeterBtn = document.getElementById('saveBulkMeterBtn');
  if(saveBulkMeterBtn) saveBulkMeterBtn.onclick = onSaveBulkMeter;
  wireBulkMeterLiveCalc();
  const saveRatesBtn = document.getElementById('saveRatesBtn');
  if(saveRatesBtn) saveRatesBtn.onclick = onSaveRates;
  const deletePropertyBtn = document.getElementById('deletePropertyBtn');
  if(deletePropertyBtn) deletePropertyBtn.onclick = onDeleteProperty;
  onSaveRates._removeQr = false;
  const qrFileInput = document.getElementById('f-qrimage');
  if(qrFileInput){
    qrFileInput.onchange = ()=>{
      const file = qrFileInput.files && qrFileInput.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        const wrap = document.getElementById('qrPreviewWrap');
        const img = document.getElementById('qrPreviewImg');
        if(img) img.src = reader.result;
        if(wrap) wrap.style.display = 'flex';
        onSaveRates._removeQr = false;
      };
      reader.readAsDataURL(file);
    };
  }
  const removeQrBtn = document.getElementById('removeQrBtn');
  if(removeQrBtn){
    removeQrBtn.onclick = ()=>{
      onSaveRates._removeQr = true;
      if(qrFileInput) qrFileInput.value = '';
      const wrap = document.getElementById('qrPreviewWrap');
      if(wrap) wrap.style.display = 'none';
    };
  }
  wireMeterLiveCalc();

  const testSheetBtn = document.getElementById('testSheetBtn');
  if(testSheetBtn) testSheetBtn.onclick = onTestAndSaveSheet;
  const clearSheetBtn = document.getElementById('clearSheetBtn');
  if(clearSheetBtn) clearSheetBtn.onclick = onClearSheet;
}

}

async function onTestAndSaveSheet(){
  const input = document.getElementById('f-sheeturl').value.trim();
  const msg = document.getElementById('settingsMsg');

    sheetUrl = '';
    try{ localStorage.setItem('dorm:sheetUrl', ''); }catch(e){}

    showToast('ปิดการซิงก์ Sheets แล้ว ใช้ข้อมูลในเครื่องนี้');

  }
  msg.textContent = 'กำลังทดสอบการเชื่อมต่อ…';

    closeModal();
    showToast('เชื่อมต่อสำเร็จ กำลังโหลดข้อมูลจาก Sheets…');

function sortRoomsWithin(list, mode){
  const byNumber = (a,b)=>a.number.localeCompare(b.number,'th',{numeric:true});
  if(mode==='vacant'){
    return list.slice().sort((a,b)=> (a.status===b.status ? byNumber(a,b) : (a.status==='vacant'?-1:1)));
  }
  if(mode==='occupied'){
    return list.slice().sort((a,b)=> (a.status===b.status ? byNumber(a,b) : (a.status==='occupied'?-1:1)));
  }
  return list.slice().sort(byNumber);
}

function wireMeterLiveCalc(){
  const prevEl = document.getElementById('f-meter-prev');
  const currEl = document.getElementById('f-meter-curr');
  const rateEl = document.getElementById('f-meter-rate');
  const calcEl = document.getElementById('meterCalc');
  if(!prevEl || !currEl || !rateEl || !calcEl) return;
  const recalc = ()=>{
    const units = Math.max((Number(currEl.value)||0) - (Number(prevEl.value)||0), 0);
    const cost = units * (Number(rateEl.value)||0);
    calcEl.innerHTML = `ใช้ไป <strong>${units}</strong> หน่วย × ${THB(Number(rateEl.value)||0)} บาท = <strong>${THB(cost)} บาท</strong>`;
  };
  [prevEl, currEl, rateEl].forEach(el=> el.oninput = recalc);
}

async function onSaveMeter(){
  const billId = onSaveMeter._billId;
  const type = onSaveMeter._type;
  const bill = bills.find(b=>b.id===billId);
  if(!bill) return;
  const prev = Number(document.getElementById('f-meter-prev').value)||0;
  const curr = Number(document.getElementById('f-meter-curr').value)||0;
  const rate = Number(document.getElementById('f-meter-rate').value)||0;
  if(curr < prev){ showToast('เลขมิเตอร์ปัจจุบันต้องไม่น้อยกว่าเลขเดิม'); return; }
  const units = curr - prev;
  const cost = units * rate;

  // อัตราที่แก้ในฟอร์มนี้ ให้มีผลกับทั้งอพาร์ทเมนท์ (บันทึกกลับไปที่ property ด้วย)
  const room = rooms.find(r=>r.id===bill.roomId);
  const prop = properties.find(p=>p.id===(room?room.propertyId:currentPropertyId));
  if(prop){
    if(type==='water') prop.waterRate = rate; else prop.electricRate = rate;
    await saveProperties();
  }

  if(type==='water'){ bill.waterPrev=prev; bill.waterCurr=curr; bill.water=cost; }
  else { bill.electricPrev=prev; bill.electricCurr=curr; bill.electric=cost; }
  bill.total = Number(bill.rent||0) + Number(bill.water||0) + Number(bill.electric||0);

  onSaveMeter._billId = null;
  onSaveMeter._type = null;
  await saveBills();
  closeModal();
  render();
  showToast('บันทึกเลขมิเตอร์แล้ว');
}

function resizeImageFile(file, maxDim, jpegQuality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=> reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=> reject(new Error('เปิดรูปไม่สำเร็จ'));
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w>h){ if(w>maxDim){ h = Math.round(h*maxDim/w); w = maxDim; } }
        else { if(h>maxDim){ w = Math.round(w*maxDim/h); h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        resolve(jpegQuality ? canvas.toDataURL('image/jpeg', jpegQuality) : canvas.toDataURL('image/png'));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* Google Sheets จำกัดความยาวต่อ 1 เซลล์ไว้ที่ 50,000 ตัวอักษร ย่อรูปให้เล็กลงเรื่อย ๆ จนกว่าจะพอดี */
async function resizeImageFileSafe(file){
  const CELL_LIMIT = 45000;
  let dataUrl = await resizeImageFile(file, 360);
  if(dataUrl.length > CELL_LIMIT) dataUrl = await resizeImageFile(file, 240);
  if(dataUrl.length > CELL_LIMIT) dataUrl = await resizeImageFile(file, 240, 0.7);
  if(dataUrl.length > CELL_LIMIT) dataUrl = await resizeImageFile(file, 160, 0.6);
  if(dataUrl.length > CELL_LIMIT) throw new Error('ไฟล์รูปมีขนาดใหญ่เกินไป กรุณาใช้รูปที่เล็กลง');
  return dataUrl;
}

async function onSaveRates(){
  const prop = currentProperty();
  if(!prop) return;
  const newName = document.getElementById('f-propname').value.trim();
  if(!newName){ showToast('กรุณากรอกชื่ออพาร์ทเมนท์'); return; }
  const dupName = properties.find(p=>p.id===newName && p.id!==prop.id);
  if(dupName){ showToast('มีอพาร์ทเมนท์ชื่อนี้อยู่แล้ว'); return; }

  prop.waterRate = Number(document.getElementById('f-waterrate').value)||0;
  prop.electricRate = Number(document.getElementById('f-electricrate').value)||0;
  prop.address = document.getElementById('f-address').value.trim();
  prop.notes = document.getElementById('f-notes').value.trim();

  const qrFileInput = document.getElementById('f-qrimage');
  const qrFile = qrFileInput && qrFileInput.files && qrFileInput.files[0];
  if(qrFile){
    try{
      prop.qrImage = await resizeImageFileSafe(qrFile);
    }catch(e){
      showToast(e.message || 'อัปโหลด QR ไม่สำเร็จ');
    }
  } else if(onSaveRates._removeQr){
    delete prop.qrImage;
  }
  onSaveRates._removeQr = false;

  if(newName !== prop.id){
    // ชื่ออพาร์ทเมนท์คือ id หลักที่ห้อง/ผู้เช่า/บิลใช้อ้างอิง — ถ้าเปลี่ยนชื่อ ต้องอัปเดตทุกที่ที่เชื่อมโยงไว้ด้วย
    const oldPropId = prop.id;
    prop.id = newName;
    prop.name = newName;
    rooms.forEach(r=>{
      if(r.propertyId===oldPropId){
        const oldRoomId = r.id;
        r.propertyId = newName;
        r.id = newName + '::' + r.number;
        tenants.forEach(t=>{ if(t.roomId===oldRoomId){ t.roomId=r.id; t.id=r.id; } });
        bills.forEach(b=>{ if(b.roomId===oldRoomId){ b.roomId=r.id; b.id=r.id+'::'+b.month; } });
      }
    });
    currentPropertyId = newName;
    try{ localStorage.setItem('dorm:currentProperty', currentPropertyId); }catch(e){}
    await Promise.all([saveRooms(), saveTenants(), saveBills()]);
  } else {
    prop.name = newName;
  }

  await saveProperties();
  closeModal();
  renderPropertySelect();
  render();
  showToast('บันทึกการตั้งค่าแล้ว');
}

async function onDeleteProperty(){
  const prop = currentProperty();
  if(!prop) return;
  if(properties.length<=1){ showToast('ต้องมีอย่างน้อย 1 อพาร์ทเมนท์ ลบไม่ได้'); return; }
  if(!confirm(`ลบอพาร์ทเมนท์ "${prop.name}"?\n\nห้องพัก ผู้เช่า และบิลทั้งหมดในอพาร์ทเมนท์นี้จะถูกลบไปด้วย และไม่สามารถกู้คืนได้`)) return;
  const propId = prop.id;
  const roomIds = new Set(rooms.filter(r=>r.propertyId===propId).map(r=>r.id));
  rooms = rooms.filter(r=>r.propertyId!==propId);
  tenants = tenants.filter(t=>!roomIds.has(t.roomId));
  bills = bills.filter(b=>!roomIds.has(b.roomId));
  properties = properties.filter(p=>p.id!==propId);
  currentPropertyId = properties[0].id;
  try{ localStorage.setItem('dorm:currentProperty', currentPropertyId); }catch(e){}
  await Promise.all([saveRooms(), saveTenants(), saveBills(), saveProperties()]);
  closeModal();
  renderPropertySelect();
  render();
  showToast('ลบอพาร์ทเมนท์แล้ว');
}

function wireBulkMeterLiveCalc(){
  const prop = currentProperty() || {};
  const waterRate = Number(prop.waterRate)||0;
  const electricRate = Number(prop.electricRate)||0;
  document.querySelectorAll('#modalBody tr[data-bill]').forEach(tr=>{
    const wInput = tr.querySelector('.bm-water');
    const eInput = tr.querySelector('.bm-electric');
    const costCell = tr.querySelector('.bm-cost');
    if(!wInput || !eInput || !costCell) return;
    const recalc = ()=>{
      const wUnits = Math.max((Number(wInput.value)||0) - (Number(wInput.dataset.prev)||0), 0);
      const eUnits = Math.max((Number(eInput.value)||0) - (Number(eInput.dataset.prev)||0), 0);
      costCell.textContent = THB(wUnits*waterRate + eUnits*electricRate) + ' บ.';
    };
    wInput.oninput = recalc;
    eInput.oninput = recalc;
  });
}

async function onSaveBulkMeter(){
  const prop = currentProperty() || {};
  const waterRate = Number(prop.waterRate)||0;
  const electricRate = Number(prop.electricRate)||0;
  const rows = document.querySelectorAll('#modalBody tr[data-bill]');
  let updated = 0, skipped = 0;
  rows.forEach(tr=>{
    const bill = bills.find(b=>b.id===tr.dataset.bill);
    if(!bill) return;
    const wInput = tr.querySelector('.bm-water');
    const eInput = tr.querySelector('.bm-electric');
    const wPrev = Number(wInput.dataset.prev)||0;
    const ePrev = Number(eInput.dataset.prev)||0;
    const wCurr = Number(wInput.value)||0;
    const eCurr = Number(eInput.value)||0;
    if(wCurr < wPrev || eCurr < ePrev){ skipped++; return; }
    bill.waterCurr = wCurr; bill.water = Math.max(wCurr-wPrev,0)*waterRate;
    bill.electricCurr = eCurr; bill.electric = Math.max(eCurr-ePrev,0)*electricRate;
    bill.total = Number(bill.rent||0) + Number(bill.water||0) + Number(bill.electric||0);
    updated++;
  });
  if(updated>0) await saveBills();
  render();
  if(skipped>0){
    showToast(`บันทึกแล้ว ${updated} ห้อง (ข้าม ${skipped} ห้อง — เลขปัจจุบันน้อยกว่าเลขเดิม)`);
  } else {
    closeModal();
    showToast(`บันทึกมิเตอร์ ${updated} ห้องเรียบร้อย`);
  }
}

function renderRangeReport(type, months){
  const isWater = type==='water';
  const label = isWater ? 'น้ำ' : 'ไฟ';
  const fromId = isWater ? 'reportWaterFrom' : 'reportElectricFrom';
  const toId = isWater ? 'reportWaterTo' : 'reportElectricTo';
  const from = isWater ? renderReports._waterFrom : renderReports._electricFrom;
  const to = isWater ? renderReports._waterTo : renderReports._electricTo;

  let fromIdx = months.indexOf(from);
  let toIdx = months.indexOf(to);
  if(fromIdx===-1) fromIdx = 0;
  if(toIdx===-1) toIdx = months.length-1;
  const lo = Math.min(fromIdx,toIdx), hi = Math.max(fromIdx,toIdx);
  const rangeMonths = months.slice(lo, hi+1);

  const rows = rangeMonths.map(m=>{
    const monthBills = currentBills().filter(b=>b.month===m);
    const cost = monthBills.reduce((s,b)=>s+(Number(isWater?b.water:b.electric)||0),0);
    const units = monthBills.reduce((s,b)=>{
      const prev = Number(isWater?b.waterPrev:b.electricPrev)||0;
      const curr = Number(isWater?b.waterCurr:b.electricCurr)||0;
      return s+Math.max(curr-prev,0);
    },0);
    return {month:m, cost, units};
  });
  const grandCost = rows.reduce((s,r)=>s+r.cost,0);
  const grandUnits = rows.reduce((s,r)=>s+r.units,0);

  return `
    <div class="card">
      <div class="card-head">
        <h3>ช่วงเดือน</h3>
        <div style="display:flex;gap:8px;align-items:center;">
          <select id="${fromId}" class="toolbar-select">
            ${months.map(m=>`<option value="${m}" ${m===from?'selected':''}>${monthLabel(m)}</option>`).join('')}
          </select>
          <span class="muted">ถึง</span>
          <select id="${toId}" class="toolbar-select">
            ${months.map(m=>`<option value="${m}" ${m===to?'selected':''}>${monthLabel(m)}</option>`).join('')}
          </select>
        </div>
      </div>
      ${rows.length===0 ? `<div class="empty"><div class="big">📊</div>ยังไม่มีข้อมูลบิลในช่วงนี้</div>` : `
      <div class="stat-row">
        <div class="stat-card"><p class="label">รวมค่า${label}ทั้งช่วง</p><p class="value teal">${THB(grandCost)}</p><p class="foot">บาท</p></div>
        <div class="stat-card"><p class="label">รวมหน่วยที่ใช้</p><p class="value">${THB(grandUnits)}</p><p class="foot">หน่วย</p></div>
        <div class="stat-card"><p class="label">จำนวนเดือน</p><p class="value">${rows.length}</p><p class="foot">เดือน</p></div>
      </div>
      <table>
        <thead><tr><th>เดือน</th><th>หน่วยที่ใช้รวม</th><th>ยอดค่า${label}รวม</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr><td style="font-weight:600;">${monthLabel(r.month)}</td><td class="mono muted">${THB(r.units)}</td><td class="mono" style="font-weight:600;">${THB(r.cost)} บ.</td></tr>`).join('')}
          <tr style="font-weight:700;background:var(--bg);"><td>รวมทั้งหมด</td><td class="mono">${THB(grandUnits)}</td><td class="mono">${THB(grandCost)} บ.</td></tr>
        </tbody>
      </table>
      `}
    </div>
  `;
}

/* ---- พิมพ์ใบแจ้งหนี้ / รายงาน ---- */
function thaiBuddhistDate(d){
  d = d || new Date();
  const day = String(d.getDate()).padStart(2,'0');
  const month = String(d.getMonth()+1).padStart(2,'0');
  const year = d.getFullYear() + 543;
  return `${day}/${month}/${year}`;
}

/* รอให้รูปภาพ (เช่น QR) โหลด/แสดงผลเสร็จก่อนค่อยเปิดหน้าต่างพิมพ์
   ป้องกันปัญหารูปไม่ขึ้นตอนพิมพ์บิลหลายใบพร้อมกัน (เบราว์เซอร์ยังวาดรูปไม่ทันตอน print ถูกเรียก) */
function waitForImages(container){
  const imgs = Array.from(container.querySelectorAll('img'));
  if(imgs.length === 0) return Promise.resolve();
  return Promise.all(imgs.map(img=>{
    if(img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(resolve=>{
      img.addEventListener('load', resolve, {once:true});
      img.addEventListener('error', resolve, {once:true});
    });
  }));
}

async function printInvoice(bill){
  const area = document.getElementById('printArea');
  area.innerHTML = invoiceHtml(bill);
  await waitForImages(area);
  window.print();
}

async function printInvoices(billList){
  if(!billList.length) return;
  const sorted = billList.slice().sort((a,b)=>{
    const ra = rooms.find(r=>r.id===a.roomId), rb = rooms.find(r=>r.id===b.roomId);
    return (ra?ra.number:'').localeCompare(rb?rb.number:'', 'th', {numeric:true});
  });
  const html = sorted.map(b=>`<div class="invoice-page">${invoiceHtml(b)}</div>`).join('');
  const area = document.getElementById('printArea');
  area.innerHTML = html;
  await waitForImages(area);
  window.print();
}

function printMonthReport(month){
  const list = currentBills().filter(b=>b.month===month);
  const property = properties.find(p=>p.id===currentPropertyId);
  const totalSum = list.reduce((s,b)=>s+Number(b.total||0),0);
  const rowsHtml = list.slice().sort((a,b)=>{
    const ra = rooms.find(r=>r.id===a.roomId), rb = rooms.find(r=>r.id===b.roomId);
    return (ra?ra.number:'').localeCompare(rb?rb.number:'', 'th', {numeric:true});
  }).map(b=>{
    const room = rooms.find(r=>r.id===b.roomId);
    return `<tr>
      <td>${room?room.number:'-'}</td>
      <td>${THB(b.rent)}</td>
      <td>${THB(b.water)}</td>
      <td>${THB(b.electric)}</td>
      <td>${THB(b.total)}</td>
      <td>${b.status==='paid'?'ชำระแล้ว':'ค้างชำระ'}</td>
    </tr>`;
  }).join('');
  const html = `
    <div class="invoice">
      <h1>รายงานค่าเช่าประจำเดือน ${monthLabel(month)}</h1>
      <p>${property?property.name:''}</p>
      <table>
        <thead><tr><th>ห้อง</th><th>ค่าเช่า</th><th>ค่าน้ำ</th><th>ค่าไฟ</th><th>รวม</th><th>สถานะ</th></tr></thead>

      </table>
      <p style="margin-top:14px;"><strong>ยอดรวมทั้งหมด: ${THB(totalSum)} บาท</strong></p>
    </div>
  `;
  document.getElementById('printArea').innerHTML = html;
  window.print();
}

async function onSaveRoom(){
  const number = document.getElementById('f-number').value.trim();
  const floor = document.getElementById('f-floor').value.trim();
  const rent = document.getElementById('f-rent').value;
  const status = document.getElementById('f-status').value;
  if(!number){ showToast('กรุณากรอกเลขห้อง'); return; }

  const editId = onSaveRoom._editId;
  // เลขห้องต้องไม่ซ้ำ "ภายในอพาร์ทเมนท์เดียวกัน" เท่านั้น — ต่างอพาร์ทเมนท์ใช้เลขห้องซ้ำกันได้
  const dup = rooms.find(r => r.propertyId===currentPropertyId && r.number === number && r.id !== editId);
  if(dup){ showToast('มีเลขห้องนี้อยู่แล้วในอพาร์ทเมนท์นี้ กรุณาใช้เลขห้องอื่น'); return; }

  if(editId){
    const room = rooms.find(r=>r.id===editId);
    const oldId = room.id;
    room.number = number; room.floor = floor; room.rent = Number(rent)||0; room.status = status;
    room.id = currentPropertyId + '::' + number;
    if(room.id !== oldId){
      // เลขห้องคือ key หลักที่ผู้เช่า/บิลใช้อ้างอิง — ถ้าเปลี่ยน ต้องอัปเดตทุกที่ที่เชื่อมโยงไว้ด้วย
      const newId = room.id;
      tenants.forEach(t=>{ if(t.roomId===oldId){ t.roomId=newId; t.id=newId; } });
      bills.forEach(b=>{ if(b.roomId===oldId){ b.roomId=newId; b.id=newId+'::'+b.month; } });
      await Promise.all([saveTenants(), saveBills()]);
    }
  } else {
    // ใช้ "อพาร์ทเมนท์::เลขห้อง" เป็น id เพื่อให้ห้องพักในต่างอพาร์ทเมนท์ไม่ชนกัน
    rooms.push({id:currentPropertyId+'::'+number, propertyId:currentPropertyId, number, floor, rent:Number(rent)||0, status});
  }
  onSaveRoom._editId = null;
  await saveRooms();
  closeModal();
  render();
  showToast('บันทึกห้องพักแล้ว');
}
async function onDeleteRoom(){
  const editId = onSaveRoom._editId;
  if(!editId) return;
  if(!confirm('ลบห้องนี้? ข้อมูลผู้เช่าที่ผูกกับห้องนี้จะไม่ถูกลบ แต่จะไม่มีห้องอ้างอิง')) return;
  rooms = rooms.filter(r=>r.id!==editId);
  await saveRooms();
  onSaveRoom._editId = null;
  closeModal();
  render();
  showToast('ลบห้องพักแล้ว');
}

async function onSaveTenant(){
  const name = document.getElementById('f-name').value.trim();
  const roomId = document.getElementById('f-room').value;
  const phone = document.getElementById('f-phone').value.trim();
  const moveIn = document.getElementById('f-movein').value;
  if(!name){ showToast('กรุณากรอกชื่อผู้เช่า'); return; }
  if(!roomId){ showToast('กรุณาเลือกห้องพัก'); return; }

  const editId = onSaveTenant._editId; // ถ้าแก้ไข: editId คือ roomId เดิม (เพราะ id ผู้เช่า = เลขห้อง)
  if(editId && editId!==roomId){
    // ย้ายผู้เช่าไปห้องอื่น: ปลดสถานะห้องเดิม
    const oldRoom = rooms.find(r=>r.id===editId);
    if(oldRoom) oldRoom.status='vacant';
    tenants = tenants.filter(t=>t.id!==editId);
  }
  // หนึ่งห้องมีผู้เช่าได้คนเดียว — ถ้ามีอยู่แล้วในห้องเป้าหมาย ให้แทนที่
  tenants = tenants.filter(t=>t.id!==roomId);
  tenants.push({id:roomId, roomId, name, phone, moveIn});

  const room = rooms.find(r=>r.id===roomId);
  if(room) room.status='occupied';

  onSaveTenant._editId = null;
  await Promise.all([saveTenants(), saveRooms()]);
  closeModal();
  render();
  showToast('บันทึกผู้เช่าแล้ว');
}
async function onDeleteTenant(){
  const editId = onSaveTenant._editId;
  if(!editId) return;
  if(!confirm('ลบผู้เช่าคนนี้?')) return;
  const tenant = tenants.find(t=>t.id===editId);
  if(tenant && tenant.roomId){
    const room = rooms.find(r=>r.id===tenant.roomId);
    if(room) room.status='vacant';
  }
  tenants = tenants.filter(t=>t.id!==editId);
  onSaveTenant._editId = null;
  await Promise.all([saveTenants(), saveRooms()]);
  closeModal();
  render();
  showToast('ลบผู้เช่าแล้ว');
}

function lastBillForRoom(roomId, beforeMonth){
  const prevBills = bills.filter(b=>b.roomId===roomId && b.month < beforeMonth);
  if(!prevBills.length) return null;
  return prevBills.reduce((a,b)=> (b.month>a.month?b:a));
}

async function generateBills(){
  const month = thisMonth();
  const occupiedRooms = currentRooms().filter(r=>r.status==='occupied');
  let created = 0;
  occupiedRooms.forEach(room=>{
    const id = room.id + '::' + month;
    const exists = bills.find(b=>b.id===id);
    if(exists) return;
    const prev = lastBillForRoom(room.id, month);
    const waterPrev = prev ? Number(prev.waterCurr||0) : 0;
    const electricPrev = prev ? Number(prev.electricCurr||0) : 0;
    bills.push({
      id, roomId:room.id, month,
      invoiceNo: genInvoiceNo(month),
      rent:Number(room.rent)||0,
      waterPrev, waterCurr:waterPrev, water:0,
      electricPrev, electricCurr:electricPrev, electric:0,
      total:Number(room.rent)||0, status:'unpaid'
    });
    created++;
  });
  await saveBills();
  renderBills._month = month;
  render();
  showToast(created>0 ? `สร้างบิลใหม่ ${created} ห้อง — อย่าลืมจดเลขมิเตอร์น้ำ-ไฟปัจจุบัน` : 'มีบิลของเดือนนี้ครบทุกห้องแล้ว');
}

/* patch modal open to remember edit id */
const _openModal = openModal;
openModal = function(html, opts){
  _openModal(html, opts);
};
document.addEventListener('click', (e)=>{
  const roomTag = e.target.closest('.room-tag');
  if(roomTag) onSaveRoom._editId = roomTag.dataset.id;
  const editTenant = e.target.closest('.edit-tenant');
  if(editTenant) onSaveTenant._editId = editTenant.dataset.id;
  if(e.target.id==='addRoomBtn') onSaveRoom._editId = null;
  if(e.target.id==='addTenantBtn') onSaveTenant._editId = null;
});

/* ============ Init ============ */
updateSyncLine();
loadData();

/* Register service worker for offline use when hosted over http(s).
   Silently does nothing when opened as a local file or inside Claude. */
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
  // เมื่อ service worker เวอร์ชันใหม่เข้าควบคุมหน้า (หลัง deploy ใหม่) ให้รีโหลดอัตโนมัติ 1 ครั้ง
  // เพื่อให้เห็นเวอร์ชันล่าสุดทันที ไม่ต้องกด refresh เอง
  let swRefreshed = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if (swRefreshed) return;
    swRefreshed = true;
    location.reload();
  });
}
</script>
